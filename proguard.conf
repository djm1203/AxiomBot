# ── Axiom ProGuard Configuration ────────────────────────────────────────────
# Used by the `release` Maven profile (mvn package -Prelease).
# Goal: obfuscate internal implementation, keep all RuneLite-facing contracts.

# ── Behaviour: obfuscate only, no optimization ────────────────────────────────
-dontoptimize
-dontpreverify
-dontnote
-dontwarn

# ── Annotations and generics ──────────────────────────────────────────────────
# Required: Guice uses annotations, Gson uses Signature for generic types
-keepattributes *Annotation*
-keepattributes Signature
-keepattributes InnerClasses
-keepattributes EnclosingMethod
-keepattributes Exceptions

# ── RuneLite plugin entry point ───────────────────────────────────────────────
# PluginManager discovers plugins by scanning for @PluginDescriptor annotations.
# Keep the whole class so Guice can instantiate it.
-keep @net.runelite.client.plugins.PluginDescriptor class * { *; }

# ── RuneLite config interface ─────────────────────────────────────────────────
# ConfigManager.getConfig(BotEngineConfig.class) uses the class reference.
# Config key names are derived from method names — must keep them.
-keep class com.botengine.osrs.BotEngineConfig { *; }

# ── ScriptSettings subclasses ─────────────────────────────────────────────────
# Gson serializes/deserializes by field name — field names must be preserved.
# Class names can be obfuscated; field names cannot.
-keepclassmembers class * extends com.botengine.osrs.ui.ScriptSettings {
    public <fields>;
    public <init>();
}

# ── BotScript getName() ───────────────────────────────────────────────────────
# Script names are displayed in the UI — getName() must return the right string.
-keepclassmembers class * extends com.botengine.osrs.script.BotScript {
    public java.lang.String getName();
    public com.botengine.osrs.ui.ScriptConfigDialog createConfigDialog(javax.swing.JComponent);
}

# ── RuneLite overlays ─────────────────────────────────────────────────────────
# OverlayManager discovers overlays by type — keep their constructors.
-keep class * extends net.runelite.client.ui.overlay.Overlay {
    public <init>(...);
}

# ── Enum values ───────────────────────────────────────────────────────────────
# Enums referenced by name (e.g. Prayer.PROTECT_FROM_MELEE via valueOf) must keep values.
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}
