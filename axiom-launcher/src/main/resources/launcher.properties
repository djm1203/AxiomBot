# Axiom Launcher — default configuration
# Override any key by creating ~/.axiom/launcher.properties

# Absolute path to the RuneLite JAR to launch.
# Must be set before any client can be started.
# Example: C:/Users/YourName/.runelite/client.jar
runelite.jar.path=

# Default JVM heap ceiling per client in megabytes.
default.heap.mb=512

# Directory scanned for script JARs shown in the Scripts tab.
# Tilde (~) is expanded to the user home directory at runtime.
scripts.dir=~/.axiom/scripts/

# Milliseconds to wait between clients when doing a bulk launch.
# Avoids hammering the login server simultaneously.
launch.delay.ms=3000

# Pass --developer-mode to RuneLite, enabling the plugin developer toolbar.
developer.mode=true
