name: Release

# Triggered when you push a version tag: git tag v1.2.3 && git push --tags
on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test --no-transfer-progress

      - name: Build obfuscated release JAR
        run: mvn package -Prelease -DskipTests --no-transfer-progress
        env:
          # Inject your Sentry DSN as a GitHub Actions secret:
          # Settings → Secrets → New secret → SENTRY_DSN
          AXIOM_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Rename JAR for release
        run: |
          VERSION=${GITHUB_REF_NAME}   # e.g. v1.2.3
          cp target/bot-engine-osrs-*-obfuscated.jar axiom-${VERSION}.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Axiom ${{ github.ref_name }}"
          body: |
            ## Axiom ${{ github.ref_name }}

            ### Installation
            1. Log in to OSRS via the official Jagex Launcher at least once
            2. Run `setup.ps1` (Windows) — installs everything automatically
            3. Launch via the desktop shortcut or `launch.bat`

            See [README.md](README.md) for full instructions.
          files: axiom-${{ github.ref_name }}.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
