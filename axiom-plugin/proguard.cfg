# Axiom plugin — ProGuard configuration for the `release` Maven profile.
#
# Run via: mvn -P release clean package
# Output:  axiom-plugin/target/axiom-plugin-1.0-SNAPSHOT-release.jar
#
# This config is conservative on purpose. The plugin has multiple reflective
# entry points (RuneLite plugin discovery, Guice DI, ScriptLoader JAR scan,
# AxiomPanel.openConfigDialog Class.forName) and any of them silently breaking
# kills the entire plugin. We preserve the public surfaces by name and only
# obfuscate the strictly-internal `com.axiom.plugin.impl.*` tree.
#
# Tighten this incrementally once a release build has been smoke-tested live.

# ── Output / general ─────────────────────────────────────────────────────────
-target 11
-dontoptimize
-allowaccessmodification

# Preserve stack traces — we strip filenames but keep line numbers, which is
# enough to map a crash back via the printed -printmapping file.
-keepattributes SourceFile,LineNumberTable
-renamesourcefileattribute SourceFile

# Annotations, signatures, and inner-class metadata must survive — every
# reflective lookup below depends on them.
-keepattributes *Annotation*,Signature,InnerClasses,EnclosingMethod,Exceptions
-keepattributes RuntimeVisibleAnnotations,RuntimeVisibleParameterAnnotations,RuntimeVisibleTypeAnnotations
-keepattributes RuntimeInvisibleAnnotations,RuntimeInvisibleParameterAnnotations,RuntimeInvisibleTypeAnnotations

# ── RuneLite plugin discovery ────────────────────────────────────────────────
# RuneLite scans the JAR for `@PluginDescriptor` classes via reflection.
-keep @net.runelite.client.plugins.PluginDescriptor public class * {
    public <init>(...);
    public *;
}

# Plugin subclasses (AxiomPlugin extends Plugin) are instantiated by Guice.
-keep public class * extends net.runelite.client.plugins.Plugin {
    public <init>(...);
    public *;
}

# `@Subscribe` event handlers — kept even though the explicit Consumer-based
# registration in AxiomPlugin.registerEventHandlers() doesn't strictly require
# the annotation. They serve as documentation and remain a fallback.
-keepclassmembers class * {
    @net.runelite.client.eventbus.Subscribe <methods>;
}

# RuneLite Config interfaces / annotations.
-keep public interface * extends net.runelite.client.config.Config { *; }
-keep @interface net.runelite.client.config.ConfigGroup
-keep @interface net.runelite.client.config.ConfigItem
-keep @interface net.runelite.client.eventbus.Subscribe
-keep @interface net.runelite.client.plugins.PluginDescriptor

# ── Guice / javax.inject dependency injection ────────────────────────────────
# Guice uses reflection on @Inject constructors / fields and @Singleton classes.
# Without these rules ProGuard renames or removes them and Guice can't wire
# anything.
-keepclassmembers class * {
    @com.google.inject.Inject <init>(...);
    @com.google.inject.Inject <fields>;
    @com.google.inject.Provides <methods>;
    @com.google.inject.name.Named <fields>;
    @javax.inject.Inject  <init>(...);
    @javax.inject.Inject  <fields>;
    @javax.inject.Named <fields>;
}
-keep @javax.inject.Singleton class * {
    public <init>(...);
    public *;
}
-keep @com.google.inject.Singleton class * {
    public <init>(...);
    public *;
}

# ── axiom-api public surface ─────────────────────────────────────────────────
# Scripts and the launcher are compiled against axiom-api by name. Renaming
# any axiom-api class would break every script.
-keep public class com.axiom.api.** {
    public protected *;
}
-keepclassmembers class com.axiom.api.** {
    public protected *;
}

# ── axiom-api annotations used reflectively at runtime ───────────────────────
-keep @interface com.axiom.api.script.ScriptManifest
-keep @interface com.axiom.api.script.ScriptCategory

# ── BotScript subclasses (script implementations) ────────────────────────────
# Reflection points that pin these:
#   1. ScriptLoader scans `com/axiom/scripts/` JAR entries by path string —
#      classes must remain in their original package and keep their names.
#   2. ScriptLoader instantiates with `getDeclaredConstructor().newInstance()`
#      so the no-arg constructor must survive.
#   3. ScriptRunner.injectField uses `getDeclaredField("players")` etc. with
#      hardcoded names — every PRIVATE injected field name must be preserved.
#   4. AxiomPanel.openConfigDialog uses script.getClass().getSimpleName() to
#      derive the dialog FQN — class names must not be obfuscated.
-keep public class * extends com.axiom.api.script.BotScript {
    *;
}

# ── ScriptSettings subclasses ────────────────────────────────────────────────
# Settings classes are constructed by config dialogs and downcast in scripts
# (raw instanceof checks). Public constructors and all public fields/enums
# must be preserved by name for cross-module access.
-keep public class * extends com.axiom.api.script.ScriptSettings {
    *;
}

# ── Config dialogs (UI) ──────────────────────────────────────────────────────
# AxiomPanel.openConfigDialog uses Class.forName("com.axiom.plugin.ui.<Base>ConfigDialog")
# and invokes the (JComponent) constructor. The package, class names, and
# constructor signatures must all be preserved.
-keep public class com.axiom.plugin.ui.** extends com.axiom.plugin.ui.ScriptConfigDialog {
    public <init>(javax.swing.JComponent);
    public *;
}
-keep public class com.axiom.plugin.ui.ScriptConfigDialog {
    public <init>(...);
    public *;
}
-keep public class com.axiom.plugin.ui.AxiomPanel {
    public <init>(...);
    public *;
}

# ── Lombok-generated logger fields ───────────────────────────────────────────
# `@Slf4j` injects `private static final Logger log` — unused-from-outside but
# read reflectively by SLF4J binding.
-keepclassmembers class * {
    private static final org.slf4j.Logger log;
}

# ── Enum support ─────────────────────────────────────────────────────────────
# Java's enum machinery and any code using EnumSet/EnumMap rely on these
# methods being present.
-keepclassmembers,allowoptimization enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}

# ── Service loader / META-INF ────────────────────────────────────────────────
-keepattributes ServiceLoader
-adaptresourcefilenames    **.properties,**.fxml,**.css,**.png,**.jpg,**.json
-adaptresourcefilecontents **.properties,**.fxml,META-INF/services/**

# ── Don't-warn for provided / external libraries ─────────────────────────────
# RuneLite is on the runtime classpath but excluded from the shaded jar.
-dontwarn net.runelite.**
-dontwarn lombok.**
-dontwarn org.slf4j.**
-dontwarn ch.qos.logback.**
-dontwarn com.google.inject.**
-dontwarn com.google.common.**
-dontwarn javax.annotation.**
-dontwarn javax.inject.**
-dontwarn sun.misc.Unsafe

# ── Diagnostics ──────────────────────────────────────────────────────────────
# Suppress noisy "Note: …" messages — when something does break, the warnings
# above the notes are the actionable signal.
-dontnote **
